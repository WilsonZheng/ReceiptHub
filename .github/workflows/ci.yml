name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx prettier --check src e2e scripts
      - run: npx vitest run
      - run: npx vite build # playwright 的 preview 服务器需要 dist/，必须先 build
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
